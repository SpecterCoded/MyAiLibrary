appId: com.myailibrary.desktop
productName: My AI Library
copyright: Copyright © 2026 My AI Library
asar: true

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - assets/**/*
  - package.json

extraResources:
  - from: ../frontend/dist
    to: ui
    filter:
      - "**/*"
  - from: ../backend/dist/myailibrary-backend
    to: backend
    filter:
      - "**/*"
  - from: vendor/ffmpeg
    to: ffmpeg
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  executableName: MyAILibrary
  verifyUpdateCodeSignature: true

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: My AI Library
  artifactName: MyAI-Library-Setup-${version}-x64.${ext}
  installerIcon: build/installerIcon.ico
  uninstallerIcon: build/uninstallerIcon.ico
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/installerSidebar.bmp
  installerHeader: build/installerHeader.bmp
  include: build/installer.nsh
  deleteAppDataOnUninstall: false
  runAfterFinish: true

# Release metadata is generated now, while in-app installation remains gated by
# package.json updatesEnabled=false until the signed release workflow enables it.
publish:
  provider: github
  owner: SpecterCoded
  repo: MyAiLibrary
  releaseType: release
  channel: stable
