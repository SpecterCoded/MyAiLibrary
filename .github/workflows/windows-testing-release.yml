name: Windows unsigned beta release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Beta semantic version, for example 0.1.4-beta.1
        required: true
        type: string
  push:
    tags:
      - "v*-beta.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      EP_PRE_RELEASE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-build.txt

      - name: Validate beta version and release notes
        shell: pwsh
        run: |
          $version = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.version }}" } else { "${{ github.ref_name }}".TrimStart("v") }
          if ($version -notmatch '^\d+\.\d+\.\d+-beta\.\d+$') { throw "Testing releases require a version like 0.1.4-beta.1." }
          $releaseNotes = (Resolve-Path "desktop/release-notes/$version.md" -ErrorAction Stop).Path
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_NOTES_FILE=$releaseNotes" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci --prefix frontend
          npm ci --prefix desktop
          python -m pip install -r backend/requirements.txt -r backend/requirements-build.txt

      - name: Enable only the unsigned beta channel
        shell: pwsh
        run: |
          npm --prefix desktop version $env:RELEASE_VERSION --no-git-tag-version
          npm --prefix desktop pkg set updatesEnabled=false
          npm --prefix desktop pkg set updatesTestMode=false
          npm --prefix desktop pkg set updatesTestingEnabled=true

      - name: Prepare pinned FFmpeg
        shell: pwsh
        run: ./desktop/scripts/fetch-ffmpeg.ps1

      - name: Build application resources
        shell: pwsh
        run: npm --prefix desktop run build

      - name: Package unsigned beta NSIS update
        shell: pwsh
        run: |
          Push-Location desktop
          try {
            & .\node_modules\.bin\electron-builder.cmd --win nsis --x64 --publish never --config.win.verifyUpdateCodeSignature=false --config.publish.channel=beta --config.publish.releaseType=prerelease --config.releaseInfo.releaseNotesFile="$env:RELEASE_NOTES_FILE"
            if ($LASTEXITCODE -ne 0) { throw "Electron Builder failed with exit code $LASTEXITCODE." }
          } finally {
            Pop-Location
          }

      - name: Verify package and generate checksum
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem desktop/release/MyAI-Library-Setup-*-x64.exe)
          if ($installers.Count -ne 1) { throw "Expected exactly one NSIS installer, found $($installers.Count)." }
          $installer = $installers[0]
          $blockMap = "$($installer.FullName).blockmap"
          if (-not (Test-Path -LiteralPath $blockMap)) { throw "Installer block map is missing: $blockMap" }
          if (-not (Test-Path -LiteralPath desktop/release/beta.yml)) { throw "Beta update metadata is missing." }
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName
          "$($hash.Hash.ToLower())  $($installer.Name)" | Set-Content desktop/release/SHA256SUMS.txt -Encoding ascii

      - name: Publish verified beta prerelease
        shell: pwsh
        run: |
          $tag = "v$env:RELEASE_VERSION"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title "My AI Library $env:RELEASE_VERSION" --notes-file "$env:RELEASE_NOTES_FILE" --prerelease
          } else {
            gh release create $tag --title "My AI Library $env:RELEASE_VERSION" --notes-file "$env:RELEASE_NOTES_FILE" --prerelease --verify-tag
          }
          if ($LASTEXITCODE -ne 0) { throw "Failed to create or update GitHub prerelease $tag." }
          gh release upload $tag desktop/release/MyAI-Library-Setup-*-x64.exe desktop/release/MyAI-Library-Setup-*-x64.exe.blockmap desktop/release/beta.yml desktop/release/SHA256SUMS.txt --clobber
          if ($LASTEXITCODE -ne 0) { throw "Failed to upload one or more release assets for $tag." }

      - name: Retain beta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-ai-library-windows-${{ env.RELEASE_VERSION }}
          path: |
            desktop/release/MyAI-Library-Setup-*-x64.exe
            desktop/release/*.blockmap
            desktop/release/beta.yml
            desktop/release/SHA256SUMS.txt
          if-no-files-found: error
