name: Windows signed release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: windows-2025
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-build.txt

      - name: Require signing credentials
        shell: pwsh
        run: |
          if (-not $env:WIN_CSC_LINK -or -not $env:WIN_CSC_KEY_PASSWORD) {
            throw "Signed releases require WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD repository secrets."
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci --prefix frontend
          npm ci --prefix desktop
          python -m pip install -r backend/requirements.txt -r backend/requirements-build.txt

      - name: Set release version and secure update policy
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') { throw "Release tag is not a semantic version." }
          $releaseNotes = (Resolve-Path "desktop/release-notes/$version.md" -ErrorAction Stop).Path
          "RELEASE_NOTES_FILE=$releaseNotes" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          npm --prefix desktop version $version --no-git-tag-version
          npm --prefix desktop pkg set updatesEnabled=true
          npm --prefix desktop pkg set updatesTestMode=false
          npm --prefix desktop pkg set updatesTestingEnabled=false

      - name: Prepare pinned FFmpeg
        shell: pwsh
        run: ./desktop/scripts/fetch-ffmpeg.ps1

      - name: Build application resources
        shell: pwsh
        run: npm --prefix desktop run build

      - name: Package and publish signed NSIS update
        shell: pwsh
        run: |
          Push-Location desktop
          try {
            & .\node_modules\.bin\electron-builder.cmd --win nsis --x64 --publish always --config.releaseInfo.releaseNotesFile="$env:RELEASE_NOTES_FILE"
            if ($LASTEXITCODE -ne 0) { throw "Electron Builder failed with exit code $LASTEXITCODE." }
          } finally {
            Pop-Location
          }

      - name: Verify Authenticode and generate checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem desktop/release/MyAI-Library-Setup-*-x64.exe | Select-Object -Single
          $signature = Get-AuthenticodeSignature -LiteralPath $installer.FullName
          if ($signature.Status -ne 'Valid') { throw "Installer signature is not valid: $($signature.Status)" }
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName
          "$($hash.Hash.ToLower())  $($installer.Name)" | Set-Content desktop/release/SHA256SUMS.txt -Encoding ascii
          gh release upload "${{ github.ref_name }}" desktop/release/SHA256SUMS.txt --clobber

      - name: Retain release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-ai-library-windows-${{ github.ref_name }}
          path: |
            desktop/release/MyAI-Library-Setup-*-x64.exe
            desktop/release/*.blockmap
            desktop/release/*.yml
            desktop/release/SHA256SUMS.txt
          if-no-files-found: error
